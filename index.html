<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تطبيقات ترتيل — تطبيقات القرآن الكريم</title>
  <meta name="description" content="اكتشف تطبيقات القرآن الكريم من ترتيل. تلاوات قرآنية وأذكار متاحة بدون إنترنت." />
  <meta name="theme-color" content="#080c14" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <style>
    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #080c14;
      --bg-card: rgba(255, 255, 255, 0.035);
      --bg-card-hover: rgba(255, 255, 255, 0.065);
      --border: rgba(255, 255, 255, 0.07);
      --border-hover: rgba(255, 255, 255, 0.14);
      --text: #eef0f4;
      --text-sec: #8590a6;
      --text-dim: #4a5468;
      --gold: #c9a84c;
      --gold-light: #f0d78c;
      --green: #34d399;
      --grad-gold: linear-gradient(135deg, #c9a84c, #f0d78c, #c9a84c);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      --r-lg: 20px;
      --r-md: 14px;
      --r-sm: 10px;
      --ease: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --font-latin: 'Inter', system-ui, -apple-system, sans-serif;
      --font-arabic: 'Noto Kufi Arabic', 'Inter', sans-serif;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: var(--font-arabic);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    [dir="ltr"] body {
      font-family: var(--font-latin);
    }

    /* ── Ambient ─────────────────────────── */
    .ambient {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }

    .ambient::before {
      content: '';
      position: absolute;
      width: 700px;
      height: 700px;
      top: -300px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(201, 168, 76, 0.06) 0%, transparent 70%);
      animation: pulse 10s ease-in-out infinite alternate;
    }

    .ambient::after {
      content: '';
      position: absolute;
      width: 500px;
      height: 500px;
      bottom: -200px;
      right: -150px;
      background: radial-gradient(circle, rgba(52, 211, 153, 0.03) 0%, transparent 70%);
      animation: pulse 12s ease-in-out infinite alternate-reverse;
    }

    @keyframes pulse {
      from {
        opacity: .4;
        transform: translateX(-50%) scale(1);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) scale(1.15);
      }
    }

    .pattern {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: .015;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(201, 168, 76, .5) 48px, rgba(201, 168, 76, .5) 49px),
        repeating-linear-gradient(90deg, transparent, transparent 48px, rgba(201, 168, 76, .5) 48px, rgba(201, 168, 76, .5) 49px);
    }

    /* ── Layout ──────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Top Bar ─────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 24px;
      animation: fadeIn .5s ease-out;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 700;
      font-size: .95rem;
      color: var(--text);
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(201, 168, 76, .4);
    }

    /* ── Language Switcher ────────────────── */
    .lang-switch {
      display: flex;
      gap: 4px;
      background: rgba(255, 255, 255, .04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 3px;
    }

    .lang-btn {
      border: none;
      background: transparent;
      color: var(--text-sec);
      font-size: .78rem;
      font-weight: 600;
      padding: 6px 14px;
      border-radius: 100px;
      cursor: pointer;
      transition: all var(--ease);
      font-family: inherit;
      letter-spacing: .3px;
    }

    .lang-btn:hover {
      color: var(--text);
    }

    .lang-btn.active {
      background: rgba(201, 168, 76, .12);
      color: var(--gold);
      box-shadow: 0 0 16px rgba(201, 168, 76, .1);
    }

    /* ── Hero (compact) ──────────────────── */
    .hero {
      text-align: center;
      padding: 32px 24px 4px;
    }

    .hero h1 {
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      font-weight: 800;
      line-height: 1.25;
      letter-spacing: -.01em;
      /* margin-bottom: 10px; */
      animation: fadeUp .5s ease-out .1s both;
    }

    .hero h1 .hi {
      background: var(--grad-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: .95rem;
      color: var(--text-sec);
      max-width: 480px;
      margin: 0 auto;
      line-height: 1.7;
      animation: fadeUp .5s ease-out .2s both;
    }

    /* ── Divider ─────────────────────────── */
    .sep {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 8px 24px 20px;
      animation: fadeIn .5s ease-out .3s both;
    }

    .sep-line {
      height: 1px;
      width: 50px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, .25), transparent);
    }

    .sep-dot {
      color: var(--gold);
      opacity: .5;
      font-size: .85rem;
    }

    /* ── Apps Grid ────────────────────────── */
    .apps-wrap {
      flex: 1;
      padding: 0 24px 48px;
      max-width: 1120px;
      width: 100%;
      margin: 0 auto;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 18px;
    }

    /* ── Card ─────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 24px;
      transition: all var(--ease);
      position: relative;
      overflow: hidden;
      animation: fadeUp .45s ease-out both;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--r-lg);
      background: linear-gradient(135deg, rgba(201, 168, 76, .04), transparent 50%);
      opacity: 0;
      transition: opacity var(--ease);
    }

    .card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-hover);
      transform: translateY(-3px);
      box-shadow: var(--shadow);
    }

    .card:hover::before {
      opacity: 1;
    }

    .card-inner {
      position: relative;
      z-index: 1;
    }

    .card-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .icon-wrap {
      position: relative;
      flex-shrink: 0;
    }

    .icon-img {
      width: 64px;
      height: 64px;
      border-radius: var(--r-md);
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(0, 0, 0, .3);
      transition: transform var(--ease);
    }

    .card:hover .icon-img {
      transform: scale(1.05);
    }

    .icon-glow {
      position: absolute;
      inset: -3px;
      border-radius: 17px;
      background: var(--grad-gold);
      opacity: 0;
      z-index: -1;
      filter: blur(8px);
      transition: opacity var(--ease);
    }

    .card:hover .icon-glow {
      opacity: .25;
    }

    .card-titles {
      flex: 1;
      min-width: 0;
    }

    .card-name {
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 3px;
    }

    .card-name-sub {
      font-size: .82rem;
      font-weight: 500;
      color: var(--text-dim);
    }

    [dir="ltr"] .card-name-sub {
      font-family: var(--font-arabic);
      direction: rtl;
      text-align: right;
    }

    [dir="rtl"] .card-name-sub {
      font-family: var(--font-latin);
      direction: ltr;
      text-align: left;
    }

    .card-desc {
      font-size: .88rem;
      color: var(--text-sec);
      line-height: 1.65;
      margin-bottom: 18px;
    }

    .card-foot {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: .68rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: .4px;
    }

    .tag--android {
      background: rgba(52, 211, 153, .08);
      color: var(--green);
      border: 1px solid rgba(52, 211, 153, .15);
    }

    .tag--feat {
      background: rgba(201, 168, 76, .08);
      color: var(--gold);
      border: 1px solid rgba(201, 168, 76, .15);
    }

    .store-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 18px;
      border-radius: var(--r-sm);
      background: rgba(255, 255, 255, .05);
      border: 1px solid rgba(255, 255, 255, .08);
      color: var(--text);
      text-decoration: none;
      font-size: .8rem;
      font-weight: 600;
      transition: all var(--ease);
      white-space: nowrap;
      font-family: inherit;
    }

    .store-btn:hover {
      background: rgba(255, 255, 255, .1);
      border-color: rgba(255, 255, 255, .18);
      box-shadow: 0 4px 20px rgba(0, 0, 0, .3);
    }

    .store-btn svg {
      width: 15px;
      height: 15px;
      flex-shrink: 0;
    }

    /* ── States ───────────────────────────── */
    .state-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 80px 24px;
      text-align: center;
    }

    .state-box .icon {
      font-size: 2.2rem;
    }

    .state-box .msg {
      font-size: .95rem;
      color: var(--text-sec);
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid rgba(201, 168, 76, .12);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ───────────────────────────── */
    .foot {
      text-align: center;
      padding: 28px 24px 36px;
      border-top: 1px solid rgba(255, 255, 255, .03);
    }

    .foot-brand {
      font-size: .8rem;
      font-weight: 600;
      color: var(--text-dim);
    }

    .foot-brand .a {
      color: var(--gold);
    }

    .foot-sub {
      font-size: .72rem;
      color: var(--text-dim);
      margin-top: 5px;
      opacity: .55;
    }

    /* ── Animations ───────────────────────── */
    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(18px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 640px) {
      .topbar {
        padding: 14px 18px;
      }

      .hero {
        padding: 24px 18px 18px;
      }

      .apps-wrap {
        padding: 0 16px 40px;
      }

      .apps-grid {
        grid-template-columns: 1fr;
        gap: 14px;
      }

      .card {
        padding: 20px;
      }

      .card-foot {
        flex-direction: column;
        align-items: stretch;
      }

      .store-btn {
        justify-content: center;
      }

      .lang-btn {
        padding: 5px 11px;
        font-size: .72rem;
      }
    }
  </style>
</head>

<body>

  <div class="ambient"></div>
  <div class="pattern"></div>

  <div class="page">
    <!-- Top Bar -->
    <nav class="topbar" id="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span data-i18n="brand">تطبيقات ترتيل</span>
      </div>
      <div class="lang-switch" id="lang-switch">
        <button class="lang-btn active" data-lang="ar">عربي</button>
        <button class="lang-btn" data-lang="en">EN</button>
        <button class="lang-btn" data-lang="fr">FR</button>
      </div>
    </nav>

    <!-- Hero -->
    <header class="hero" id="hero">
      <h1><span data-i18n="heroTitle">تطبيقات <span class="hi">القرآن الكريم</span></span></h1>
    </header>

    <div class="sep">
      <span class="sep-line"></span>
      <span class="sep-dot">✦</span>
      <span class="sep-line"></span>
    </div>

    <!-- Apps -->
    <main class="apps-wrap" id="apps-wrap">
      <div class="state-box" id="loading">
        <div class="spinner"></div>
        <div class="msg" data-i18n="loading">جارٍ التحميل…</div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="foot">
      <div class="foot-brand" data-i18n="footer"><span class="a">تطبيقات ترتيل</span></div>
      <div class="foot-sub">© 2026</div>
    </footer>
  </div>

  <script>
    /* ═══════════════════════════════════════════
       i18n — Translations
       ═══════════════════════════════════════════ */
    const I18N = {
      ar: {
        dir: 'rtl', lang: 'ar',
        title: 'تطبيقات ترتيل — تطبيقات القرآن الكريم',
        metaDesc: 'اكتشف تطبيقات القرآن الكريم من ترتيل. تلاوات قرآنية وأذكار متاحة بدون إنترنت.',
        brand: 'تطبيقات ترتيل',
        heroTitle: 'تطبيقات <span class="hi">القرآن الكريم</span>',
        heroDesc: 'تطبيقات قرآنية مصممة بعناية — لتقريب كلام الله إليك، بدون إنترنت وفي كل وقت.',
        loading: 'جارٍ التحميل…',
        error: 'تعذّر تحميل التطبيقات. حاول مرة أخرى.',
        empty: 'لا توجد تطبيقات حالياً — ترقبوا الجديد!',
        getApp: 'Google Play',
        android: 'أندرويد',
        featured: '★ مميّز',
        footer: '<span class="a">تطبيقات ترتيل</span>',
      },
      en: {
        dir: 'ltr', lang: 'en',
        title: 'Tarteel Apps — Quran Apps Collection',
        metaDesc: 'Discover beautifully crafted Quran apps by Tarteel. Recitations, Adhkar, and more — all offline.',
        brand: 'Tarteel Apps',
        heroTitle: '<span class="hi">Quran</span> Apps',
        heroDesc: 'Beautifully crafted Quran apps — bringing the words of Allah closer, offline and always accessible.',
        loading: 'Loading apps…',
        error: 'Unable to load apps. Please try again.',
        empty: 'No apps yet — stay tuned!',
        getApp: 'Google Play',
        android: 'Android',
        featured: '★ Featured',
        footer: '<span class="a">Tarteel Apps</span>',
      },
      fr: {
        dir: 'ltr', lang: 'fr',
        title: 'Tarteel Apps — Applications du Coran',
        metaDesc: 'Découvrez les applications du Coran par Tarteel. Récitations et invocations, disponibles hors ligne.',
        brand: 'Tarteel Apps',
        heroTitle: 'Applications du <span class="hi">Coran</span>',
        heroDesc: 'Des applications coraniques conçues avec soin — pour rapprocher la parole d\'Allah, hors ligne et à tout moment.',
        loading: 'Chargement…',
        error: 'Impossible de charger les applications. Réessayez.',
        empty: 'Aucune application pour le moment — restez à l\'écoute !',
        getApp: 'Google Play',
        android: 'Android',
        featured: '★ Vedette',
        footer: '<span class="a">Tarteel Apps</span>',
      }
    };

    /* ═══════════════════════════════════════════
       State
       ═══════════════════════════════════════════ */
    let currentLang = localStorage.getItem('tarteel-lang') || 'ar';
    let appsData = null;

    /* ═══════════════════════════════════════════
       DOM Refs
       ═══════════════════════════════════════════ */
    const $root = document.documentElement;
    const $wrap = document.getElementById('apps-wrap');
    const $langBtns = document.querySelectorAll('.lang-btn');

    /* ═══════════════════════════════════════════
       Language Switching
       ═══════════════════════════════════════════ */
    function setLang(lang) {
      currentLang = lang;
      localStorage.setItem('tarteel-lang', lang);
      const t = I18N[lang];

      // Direction & lang
      $root.setAttribute('lang', t.lang);
      $root.setAttribute('dir', t.dir);

      // Title & meta
      document.title = t.title;
      document.querySelector('meta[name="description"]').content = t.metaDesc;

      // Static text
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key]) el.innerHTML = t[key];
      });

      // Active button
      $langBtns.forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });

      // Re-render apps if loaded
      if (appsData) renderApps(appsData);
    }

    // Click handlers
    $langBtns.forEach(btn => {
      btn.addEventListener('click', () => setLang(btn.dataset.lang));
    });

    /* ═══════════════════════════════════════════
       Render Apps
       ═══════════════════════════════════════════ */
    function renderApps(apps) {
      const t = I18N[currentLang];

      if (!apps.length) {
        $wrap.innerHTML = `<div class="state-box"><div class="icon">📱</div><div class="msg">${t.empty}</div></div>`;
        return;
      }

      const isAr = currentLang === 'ar';
      const subLang = isAr ? 'en' : 'ar';
      const playSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>';

      const cards = apps.map((app, i) => {
        const name = app.name[currentLang] || app.name.en || app.name.ar;
        const nameSub = app.name[subLang] || '';
        const desc = app.description[currentLang] || app.description.en || app.description.ar;
        const icon = app.icon || `icons/${app.id}.png`;

        return `
        <article class="card" style="animation-delay:${i * .08}s" id="app-${app.id}">
          <div class="card-inner">
            <div class="card-head">
              <div class="icon-wrap">
                <div class="icon-glow"></div>
                <img class="icon-img" src="${icon}" alt="${name}" loading="lazy" />
              </div>
              <div class="card-titles">
                <div class="card-name">${name}</div>
                ${nameSub ? `<div class="card-name-sub">${nameSub}</div>` : ''}
              </div>
            </div>
            <p class="card-desc">${desc}</p>
            <div class="card-foot">
              <div class="tags">
                <span class="tag tag--android">${t.android}</span>
                ${app.featured ? `<span class="tag tag--feat">${t.featured}</span>` : ''}
              </div>
              <a href="${app.playStoreUrl}" target="_blank" rel="noopener noreferrer"
                 class="store-btn" aria-label="${t.getApp} — ${name}">
                ${playSvg} ${t.getApp}
              </a>
            </div>
          </div>
        </article>`;
      }).join('');

      $wrap.innerHTML = `<div class="apps-grid">${cards}</div>`;
    }

    /* ═══════════════════════════════════════════
       Fetch & Init
       ═══════════════════════════════════════════ */
    (async function init() {
      // Apply saved language immediately
      setLang(currentLang);

      try {
        const res = await fetch('https://tarteelquranapps.github.io/apps.json');
        if (!res.ok) throw new Error('Network error');
        const data = await res.json();
        appsData = (data.apps || []).sort((a, b) => a.order - b.order);
        renderApps(appsData);
      } catch (err) {
        console.error(err);
        const t = I18N[currentLang];
        $wrap.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><div class="msg">${t.error}</div></div>`;
      }
    })();
  </script>

</body>

</html>
