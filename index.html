<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tarteel Apps — Islamic Apps by Tarteel Quran Apps</title>
  <meta name="description" content="Discover beautifully crafted Islamic apps by Tarteel Quran Apps. Quran recitations, Adhkar, and more — all available on Google Play." />
  <meta name="theme-color" content="#0a0f1a" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Kufi+Arabic:wght@500;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset & Base ───────────────────────────────── */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #06090f;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --border-card: rgba(255, 255, 255, 0.08);
      --border-card-hover: rgba(255, 255, 255, 0.15);
      --text-primary: #f0f2f5;
      --text-secondary: #8b93a7;
      --text-muted: #555e73;
      --accent: #c9a84c;
      --accent-glow: rgba(201, 168, 76, 0.25);
      --accent-secondary: #2ecc71;
      --gradient-gold: linear-gradient(135deg, #c9a84c 0%, #f0d78c 50%, #c9a84c 100%);
      --gradient-hero: radial-gradient(ellipse at 50% 0%, rgba(201, 168, 76, 0.08) 0%, transparent 60%);
      --shadow-card: 0 4px 24px rgba(0, 0, 0, 0.3);
      --shadow-card-hover: 0 12px 40px rgba(0, 0, 0, 0.5);
      --radius-lg: 20px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Ambient Background ─────────────────────────── */
    .ambient-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .ambient-bg::before {
      content: '';
      position: absolute;
      width: 600px;
      height: 600px;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      background: radial-gradient(circle, rgba(201, 168, 76, 0.07) 0%, transparent 70%);
      animation: ambientPulse 8s ease-in-out infinite alternate;
    }

    .ambient-bg::after {
      content: '';
      position: absolute;
      width: 400px;
      height: 400px;
      bottom: -100px;
      right: -100px;
      background: radial-gradient(circle, rgba(46, 204, 113, 0.04) 0%, transparent 70%);
      animation: ambientPulse 10s ease-in-out infinite alternate-reverse;
    }

    @keyframes ambientPulse {
      from { opacity: 0.5; transform: translateX(-50%) scale(1); }
      to   { opacity: 1;   transform: translateX(-50%) scale(1.2); }
    }

    /* ── Geometric Pattern Overlay ──────────────────── */
    .pattern-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.02;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(201, 168, 76, 0.5) 40px, rgba(201, 168, 76, 0.5) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(201, 168, 76, 0.5) 40px, rgba(201, 168, 76, 0.5) 41px);
    }

    /* ── Main Content ───────────────────────────────── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header / Hero ──────────────────────────────── */
    .hero {
      text-align: center;
      padding: 80px 24px 40px;
      position: relative;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border-radius: 100px;
      background: rgba(201, 168, 76, 0.08);
      border: 1px solid rgba(201, 168, 76, 0.2);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--accent);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 24px;
      animation: fadeInDown 0.6s ease-out;
    }

    .hero-badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-secondary);
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.8); }
    }

    .hero h1 {
      font-size: clamp(2rem, 5vw, 3.2rem);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1.15;
      margin-bottom: 16px;
      animation: fadeInUp 0.6s ease-out 0.1s both;
    }

    .hero h1 .highlight {
      background: var(--gradient-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero p {
      font-size: 1.1rem;
      color: var(--text-secondary);
      max-width: 520px;
      margin: 0 auto;
      line-height: 1.7;
      animation: fadeInUp 0.6s ease-out 0.2s both;
    }

    /* ── Decorative Divider ──────────────────────────── */
    .divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 0 24px;
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease-out 0.3s both;
    }

    .divider-line {
      height: 1px;
      width: 60px;
      background: linear-gradient(90deg, transparent, rgba(201, 168, 76, 0.3), transparent);
    }

    .divider-icon {
      font-size: 1rem;
      color: var(--accent);
      opacity: 0.6;
    }

    /* ── Apps Grid ───────────────────────────────────── */
    .apps-section {
      flex: 1;
      padding: 0 24px 60px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }

    .apps-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 20px;
    }

    /* ── App Card ────────────────────────────────────── */
    .app-card {
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      border-radius: var(--radius-lg);
      padding: 28px;
      transition: all var(--transition-smooth);
      cursor: default;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease-out both;
    }

    .app-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: var(--radius-lg);
      background: linear-gradient(135deg, rgba(201, 168, 76, 0.03) 0%, transparent 50%);
      opacity: 0;
      transition: opacity var(--transition-smooth);
    }

    .app-card:hover {
      background: var(--bg-card-hover);
      border-color: var(--border-card-hover);
      box-shadow: var(--shadow-card-hover);
      transform: translateY(-4px);
    }

    .app-card:hover::before { opacity: 1; }

    .app-card-inner {
      position: relative;
      z-index: 1;
    }

    .app-card-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 16px;
    }

    .app-icon-wrapper {
      position: relative;
      flex-shrink: 0;
    }

    .app-icon {
      width: 72px;
      height: 72px;
      border-radius: var(--radius-md);
      object-fit: cover;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
      transition: transform var(--transition-smooth);
    }

    .app-card:hover .app-icon { transform: scale(1.05); }

    .app-icon-glow {
      position: absolute;
      inset: -4px;
      border-radius: 18px;
      background: var(--gradient-gold);
      opacity: 0;
      z-index: -1;
      filter: blur(8px);
      transition: opacity var(--transition-smooth);
    }

    .app-card:hover .app-icon-glow { opacity: 0.3; }

    .app-card-titles {
      flex: 1;
      min-width: 0;
    }

    .app-name {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .app-name-ar {
      font-family: 'Noto Kufi Arabic', sans-serif;
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-muted);
      direction: rtl;
    }

    .app-description {
      font-size: 0.9rem;
      color: var(--text-secondary);
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .app-card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .app-tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .app-tag {
      font-size: 0.7rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 100px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .app-tag--android {
      background: rgba(46, 204, 113, 0.1);
      color: #2ecc71;
      border: 1px solid rgba(46, 204, 113, 0.2);
    }

    .app-tag--featured {
      background: rgba(201, 168, 76, 0.1);
      color: var(--accent);
      border: 1px solid rgba(201, 168, 76, 0.2);
    }

    .play-store-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-radius: var(--radius-sm);
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      text-decoration: none;
      font-size: 0.82rem;
      font-weight: 600;
      transition: all var(--transition-smooth);
      white-space: nowrap;
    }

    .play-store-btn:hover {
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.2);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
    }

    .play-store-btn svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── Loading State ──────────────────────────────── */
    .loading-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      padding: 80px 24px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid rgba(201, 168, 76, 0.15);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    /* ── Error State ────────────────────────────────── */
    .error-container {
      text-align: center;
      padding: 80px 24px;
    }

    .error-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .error-msg {
      font-size: 1rem;
      color: var(--text-secondary);
    }

    /* ── Empty State ────────────────────────────────── */
    .empty-container {
      text-align: center;
      padding: 80px 24px;
    }

    .empty-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
    }

    .empty-msg {
      font-size: 1rem;
      color: var(--text-secondary);
    }

    /* ── Footer ─────────────────────────────────────── */
    .site-footer {
      text-align: center;
      padding: 32px 24px 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.04);
    }

    .footer-brand {
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .footer-brand .accent { color: var(--accent); }

    .footer-sub {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 6px;
      opacity: 0.6;
    }

    /* ── Stats Bar ──────────────────────────────────── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 0 24px 40px;
      animation: fadeInUp 0.6s ease-out 0.35s both;
    }

    .stat-item {
      text-align: center;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      background: var(--gradient-gold);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px;
    }

    /* ── Animations ──────────────────────────────────── */
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Responsive ──────────────────────────────────── */
    @media (max-width: 480px) {
      .hero { padding: 60px 20px 32px; }
      .apps-grid { grid-template-columns: 1fr; }
      .app-card { padding: 22px; }
      .app-card-footer { flex-direction: column; align-items: flex-start; }
      .stats-bar { gap: 24px; }
      .stat-value { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <!-- Ambient background effects -->
  <div class="ambient-bg"></div>
  <div class="pattern-overlay"></div>

  <div class="page-wrapper">
    <!-- Hero Section -->
    <header class="hero">
      <div class="hero-badge">
        <span class="dot"></span>
        Tarteel Quran Apps
      </div>
      <h1>Crafting <span class="highlight">Islamic Apps</span><br />with Purpose</h1>
      <p>Beautifully designed Quran and Islamic apps — built to bring the words of Allah closer to millions, offline and always accessible.</p>
    </header>

    <!-- Stats -->
    <div class="stats-bar" id="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="stat-apps">—</div>
        <div class="stat-label">Apps</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="stat-languages">3</div>
        <div class="stat-label">Languages</div>
      </div>
      <div class="stat-item">
        <div class="stat-value">100%</div>
        <div class="stat-label">Offline</div>
      </div>
    </div>

    <!-- Decorative Divider -->
    <div class="divider">
      <span class="divider-line"></span>
      <span class="divider-icon">✦</span>
      <span class="divider-line"></span>
    </div>

    <!-- Apps Section -->
    <main class="apps-section" id="apps-section">
      <div class="loading-container" id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">Loading apps…</div>
      </div>
    </main>

    <!-- Footer -->
    <footer class="site-footer">
      <div class="footer-brand">Built with ♡ by <span class="accent">Tarteel Quran Apps</span></div>
      <div class="footer-sub">© 2026 — All rights reserved</div>
    </footer>
  </div>

  <script>
    (async function () {
      const section = document.getElementById('apps-section');
      const loading = document.getElementById('loading');
      const statApps = document.getElementById('stat-apps');

      try {
        const res = await fetch('apps.json');
        if (!res.ok) throw new Error('Failed to load apps');
        const data = await res.json();
        const apps = (data.apps || []).sort((a, b) => a.order - b.order);

        // Update stats
        statApps.textContent = apps.length;

        if (apps.length === 0) {
          section.innerHTML = `
            <div class="empty-container">
              <div class="empty-icon">📱</div>
              <div class="empty-msg">No apps published yet — stay tuned!</div>
            </div>`;
          return;
        }

        // Build grid
        const grid = document.createElement('div');
        grid.className = 'apps-grid';

        apps.forEach((app, index) => {
          const card = document.createElement('article');
          card.className = 'app-card';
          card.style.animationDelay = `${0.1 * index}s`;
          card.id = `app-${app.id}`;

          // Resolve icon: use local path as fallback
          const iconUrl = app.icon || `icons/${app.id}.png`;

          card.innerHTML = `
            <div class="app-card-inner">
              <div class="app-card-header">
                <div class="app-icon-wrapper">
                  <div class="app-icon-glow"></div>
                  <img class="app-icon" src="${iconUrl}" alt="${app.name.en}" loading="lazy" />
                </div>
                <div class="app-card-titles">
                  <div class="app-name">${app.name.en}</div>
                  ${app.name.ar ? `<div class="app-name-ar">${app.name.ar}</div>` : ''}
                </div>
              </div>
              <p class="app-description">${app.description.en}</p>
              <div class="app-card-footer">
                <div class="app-tags">
                  <span class="app-tag app-tag--android">Android</span>
                  ${app.featured ? '<span class="app-tag app-tag--featured">★ Featured</span>' : ''}
                </div>
                <a href="${app.playStoreUrl}" target="_blank" rel="noopener noreferrer" class="play-store-btn" aria-label="Get ${app.name.en} on Google Play">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polygon points="5 3 19 12 5 21 5 3"/>
                  </svg>
                  Google Play
                </a>
              </div>
            </div>`;

          grid.appendChild(card);
        });

        section.innerHTML = '';
        section.appendChild(grid);

      } catch (err) {
        console.error(err);
        section.innerHTML = `
          <div class="error-container">
            <div class="error-icon">⚠️</div>
            <div class="error-msg">Unable to load apps. Please try again later.</div>
          </div>`;
      }
    })();
  </script>

</body>
</html>
